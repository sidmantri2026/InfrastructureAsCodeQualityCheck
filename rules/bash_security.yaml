category: Bash - Security
technology: bash
description: >
  Security rules for Linux bash shell scripts.
  Covers credential exposure, injection vulnerabilities, unsafe operations,
  privilege escalation, and insecure network usage.
rules:

  - id: BASH-SEC-001
    name: No hardcoded passwords or secrets
    severity: critical
    description: "Passwords, tokens, API keys, and secrets must never be hardcoded in shell scripts. Use environment variables, a secrets manager, or a vault."
    rationale: "Hardcoded credentials in scripts will be committed to source control and visible to anyone with read access to the repository. They also appear in process listings (ps aux) and shell history."
    match_type: regex
    target: any
    pattern: "(PASSWORD|PASSWD|SECRET|API_KEY|TOKEN|PRIVATE_KEY|ACCESS_KEY)\\s*=\\s*['\"]?[A-Za-z0-9+/!@#$%^&*]{8,}['\"]?"
    flags: IGNORECASE
    exclude_pattern: "\\$\\{|\\$\\(|#|changeme|example|PLACEHOLDER|YOUR_|<|>"
    example_bad: |
      DB_PASSWORD="MyS3cr3tPass!"
      API_KEY="sk-proj-abc123xyz"
    example_good: |
      DB_PASSWORD="${VAULT_DB_PASSWORD}"
      API_KEY="${SECRETS_API_KEY}"

  - id: BASH-SEC-002
    name: Avoid eval — command injection risk
    severity: critical
    description: "The 'eval' command must not be used. It executes arbitrary strings as shell commands and is a primary vector for command injection."
    rationale: "If any part of the string passed to eval is user-controlled or comes from an external source, an attacker can inject arbitrary commands. There is almost always a safer alternative."
    match_type: regex
    target: any
    pattern: "^\\s*eval\\s+"
    exclude_pattern: "#"
    example_bad: |
      eval "$USER_INPUT"
      eval "export $VAR_NAME=$VAR_VALUE"
    example_good: |
      # Use declare for dynamic variables instead
      declare "$VAR_NAME=$VAR_VALUE"

  - id: BASH-SEC-003
    name: Validate all external input before use
    severity: error
    description: "Variables sourced from environment variables, command arguments, or external sources must be validated before use in commands."
    rationale: "Unvalidated external input can contain shell metacharacters or path traversal sequences that allow attackers to manipulate command execution or access unintended files."
    match_type: regex
    target: any
    pattern: "(rm|mv|cp|chmod|chown|dd|mkfs)\\s+.*\\$\\{?1\\}?|\\$\\{?1\\}?.*\\s+(rm|mv|cp|chmod|chown)"
    exclude_pattern: "#|\\[\\["
    example_bad: |
      TARGET_DIR=$1
      rm -rf "$TARGET_DIR"
    example_good: |
      TARGET_DIR=$1
      if [[ ! "$TARGET_DIR" =~ ^/opt/deploy/ ]]; then
        echo "ERROR: Invalid target directory: $TARGET_DIR" >&2
        exit 1
      fi
      rm -rf "$TARGET_DIR"

  - id: BASH-SEC-004
    name: Do not disable SSL/TLS certificate verification
    severity: critical
    description: "curl and wget must not use --insecure, -k, or --no-check-certificate flags that disable TLS certificate validation."
    rationale: "Disabling certificate verification exposes connections to man-in-the-middle attacks. An attacker on the network can intercept the connection, serve malicious content, and the script will silently accept it."
    match_type: regex
    target: any
    pattern: "curl\\s+.*(-k|--insecure)|wget\\s+.*(--no-check-certificate)"
    exclude_pattern: "#"
    example_bad: |
      curl -k https://internal-api.example.com/data
      wget --no-check-certificate https://packages.example.com/agent.tar.gz
    example_good: |
      curl --cacert /etc/ssl/certs/ca-bundle.crt https://internal-api.example.com/data
      wget https://packages.example.com/agent.tar.gz

  - id: BASH-SEC-005
    name: Avoid using /tmp without secure creation
    severity: error
    description: "Temporary files must be created using mktemp, not by constructing predictable paths in /tmp manually."
    rationale: "Predictable /tmp paths are vulnerable to symlink attacks (TOCTOU). An attacker can pre-create a symlink at the path, causing the script to write to an attacker-controlled location. mktemp creates files with unique, unpredictable names."
    match_type: regex
    target: any
    pattern: "(TMPFILE|TMP_FILE|TEMP_FILE|tmpfile)\\s*=\\s*['\"]?/tmp/[a-zA-Z]"
    exclude_pattern: "#|mktemp|\\$\\("
    example_bad: |
      TMPFILE="/tmp/deploy_output.txt"
      some_command > "$TMPFILE"
    example_good: |
      TMPFILE=$(mktemp /tmp/deploy_output.XXXXXX)
      trap 'rm -f "$TMPFILE"' EXIT
      some_command > "$TMPFILE"

  - id: BASH-SEC-006
    name: Clean up temporary files on exit
    severity: warning
    description: "Scripts that create temporary files must use a trap to ensure cleanup on exit, including on error."
    rationale: "Temporary files left on disk may contain sensitive data (credentials, keys, intermediate output). Using 'trap ... EXIT' ensures cleanup runs even when the script exits due to an error."
    match_type: regex
    target: any
    pattern: "mktemp"
    require_nearby_pattern: "trap"
    example_bad: |
      TMPFILE=$(mktemp)
      echo "$SECRET_DATA" > "$TMPFILE"
      process_file "$TMPFILE"
    example_good: |
      TMPFILE=$(mktemp)
      trap 'rm -f "$TMPFILE"' EXIT
      echo "$SECRET_DATA" > "$TMPFILE"
      process_file "$TMPFILE"

  - id: BASH-SEC-007
    name: Do not run scripts as root unless explicitly required
    severity: warning
    description: "Scripts must not require or assume root unless absolutely necessary. Add a check if root is truly needed, and document why."
    rationale: "Running as root without necessity violates least-privilege principles. A bug in a root script can cause irreversible system damage. Scripts should run as the minimum required privilege level."
    match_type: regex
    target: any
    pattern: "\\$EUID\\s*-ne\\s*0|\\$EUID\\s*!=\\s*0|\\$\\(whoami\\).*root"
    require_comment_nearby: true
    example_bad: |
      if [[ $EUID -ne 0 ]]; then
        echo "Run as root"
        exit 1
      fi
    example_good: |
      # Root is required to write to /etc/systemd/system
      if [[ $EUID -ne 0 ]]; then
        echo "ERROR: This script must be run as root to install systemd units." >&2
        exit 1
      fi

  - id: BASH-SEC-008
    name: Avoid storing credentials in shell history via environment
    severity: error
    description: "Do not pass credentials as inline environment variable assignments before commands (e.g. PASSWORD=secret ./script.sh) — this exposes them in shell history and process listings."
    rationale: "Inline credential assignments appear in shell history files (.bash_history) and in /proc/<pid>/environ, visible to other users and monitoring tools. Use a secrets file sourced securely or a dedicated secrets manager."
    match_type: regex
    target: any
    pattern: "(PASSWORD|SECRET|TOKEN|API_KEY)=['\"]?[^$\\s\"\\']{6,}['\"]?\\s+\\./"
    flags: IGNORECASE
    exclude_pattern: "#"
    example_bad: |
      DB_PASSWORD=secretpass ./deploy.sh
    example_good: |
      source /etc/deploy/secrets.env
      ./deploy.sh

  - id: BASH-SEC-009
    name: Use secure permissions when creating files
    severity: error
    description: "Files containing sensitive data must be created with restrictive permissions (0600 or tighter). Set umask 077 at the top of scripts that create sensitive files."
    rationale: "Without explicit permission settings, files inherit the process umask, which is often 022 (world-readable). Sensitive data written to world-readable files is accessible to all users on the system."
    match_type: regex
    target: any
    pattern: "(echo|printf|cat)\\s+.*>\\s+.*\\.(key|pem|crt|conf|env|secret|cred)"
    exclude_pattern: "#"
    example_bad: |
      echo "$PRIVATE_KEY" > /etc/app/server.key
    example_good: |
      umask 077
      echo "$PRIVATE_KEY" > /etc/app/server.key
      chmod 600 /etc/app/server.key

  - id: BASH-SEC-010
    name: Avoid curl | bash pattern (remote code execution)
    severity: critical
    description: "Never pipe the output of curl, wget, or any network command directly into bash, sh, or any interpreter."
    rationale: "curl | bash executes arbitrary remote code without any verification. If the remote server is compromised or the connection is intercepted, malicious code runs immediately with the script's permissions. Always download, verify, then execute."
    match_type: regex
    target: any
    pattern: "(curl|wget)\\s+.*\\|\\s*(bash|sh|python|ruby|perl|node)"
    exclude_pattern: "#"
    example_bad: |
      curl https://get.example.com/install.sh | bash
      wget -qO- https://setup.example.com/agent | sh
    example_good: |
      curl -o /tmp/install.sh https://get.example.com/install.sh
      sha256sum --check /tmp/install.sh.sha256
      bash /tmp/install.sh

  - id: BASH-SEC-011
    name: Use full paths for system binaries in privileged scripts
    severity: warning
    description: "In scripts running with elevated privileges, use full paths for system binaries (e.g. /bin/rm not rm) to prevent PATH manipulation attacks."
    rationale: "An attacker with write access to a directory in PATH can place a malicious binary named 'rm' or 'cp' that runs before the system binary. Privileged scripts using relative names are vulnerable to this PATH hijacking."
    match_type: regex
    target: any
    pattern: "^\\s*(rm|cp|mv|chmod|chown|useradd|usermod|passwd|systemctl|service)\\s+"
    exclude_pattern: "#|/bin/|/usr/bin/|/sbin/|/usr/sbin/"
    example_bad: |
      rm -rf "$OLD_DIR"
      useradd -m "$NEW_USER"
    example_good: |
      /bin/rm -rf "$OLD_DIR"
      /usr/sbin/useradd -m "$NEW_USER"

  - id: BASH-SEC-012
    name: Do not ignore exit codes from critical commands
    severity: error
    description: "Exit codes from critical commands (rm, cp, mv, ssh, scp, rsync, curl) must be checked. Do not use '|| true' to swallow failures from these commands."
    rationale: "Silently ignoring failures from critical operations can leave the system in a partially deployed, inconsistent, or insecure state. Every failure should be handled explicitly with an informative error message."
    match_type: regex
    target: any
    pattern: "(rm|cp|mv|ssh|scp|rsync|curl|wget)\\s+.*\\|\\|\\s*true"
    exclude_pattern: "#"
    example_bad: |
      rm -rf "$OLD_DEPLOY" || true
      scp "$BINARY" "$REMOTE_HOST:/opt/app/" || true
    example_good: |
      rm -rf "$OLD_DEPLOY" || { echo "ERROR: Failed to remove old deploy dir" >&2; exit 1; }
      scp "$BINARY" "$REMOTE_HOST:/opt/app/" || { echo "ERROR: SCP failed" >&2; exit 1; }
