category: Idempotency & Structure
technology: ansible
description: Rules ensuring playbooks are idempotent, well-structured, and maintainable.
rules:

  - id: ANS-IDE-001
    name: Use FQCN (Fully Qualified Collection Names) for all modules
    severity: error
    description: Always use the fully qualified collection name for modules (e.g., ansible.builtin.copy not just copy). This prevents ambiguity when multiple collections are installed.
    rationale: Short module names are resolved by collection priority order, which can change. FQCNs are explicit, unambiguous, and future-proof.
    match_type: regex
    target: task_module
    pattern: "^\\s{4,}(copy|template|file|service|package|apt|yum|dnf|user|group|command|shell|lineinfile|replace|uri|get_url|unarchive|stat|set_fact|include_tasks|import_tasks|debug|fail|assert|wait_for|cron|mount|sysctl|systemd)\\s*:"
    example_bad: |
      - name: Copy config file
        copy:
          src: foo.conf
          dest: /etc/foo.conf
    example_good: |
      - name: Copy config file
        ansible.builtin.copy:
          src: foo.conf
          dest: /etc/foo.conf

  - id: ANS-IDE-002
    name: Avoid using 'ignore_errors' broadly
    severity: warning
    description: "Do not use 'ignore_errors: true' as a catch-all. Use 'failed_when' or 'block/rescue' for proper error handling."
    rationale: Ignoring errors masks real failures and makes debugging impossible. If a task is expected to sometimes fail, model that expectation with 'failed_when'.
    match_type: regex
    target: any
    pattern: "ignore_errors:\\s*true|yes"
    flags: IGNORECASE
    example_bad: |
      - name: Stop service
        ansible.builtin.service:
          name: myapp
          state: stopped
        ignore_errors: true
    example_good: |
      - name: Stop service if running
        ansible.builtin.service:
          name: myapp
          state: stopped
        failed_when: false
        register: stop_result

  - id: ANS-IDE-003
    name: Use 'state' parameter for idempotency
    severity: error
    description: Modules that support a 'state' parameter (package, service, file, user) must always include it explicitly.
    rationale: Omitting 'state' relies on module defaults, which may change across versions. Explicit state declarations make intent clear and ensure idempotency.
    match_type: module_missing_param
    module: "(ansible.builtin.apt|ansible.builtin.yum|ansible.builtin.dnf|ansible.builtin.service|ansible.builtin.user|ansible.builtin.group)"
    required_param: state
    example_bad: |
      - name: Install nginx
        ansible.builtin.apt:
          name: nginx
    example_good: |
      - name: Install nginx
        ansible.builtin.apt:
          name: nginx
          state: present

  - id: ANS-IDE-004
    name: Tags must be applied to all tasks in shared roles
    severity: warning
    description: Tasks in shared/reusable roles should have tags to allow selective execution.
    rationale: Tags allow operators to run specific subsets of tasks during partial deployments or troubleshooting without running the full playbook.
    match_type: regex
    target: any
    pattern: "^\\s*- name:.+"
    require_nearby: "tags:"
    example_bad: |
      - name: Install nginx
        ansible.builtin.apt:
          name: nginx
          state: present
    example_good: |
      - name: Install nginx
        ansible.builtin.apt:
          name: nginx
          state: present
        tags:
          - nginx
          - install

  - id: ANS-IDE-005
    name: Handlers must have unique descriptive names
    severity: error
    description: Handler names must be unique within a playbook and descriptive enough to understand what they do without reading the task body.
    rationale: Duplicate handler names cause unpredictable behavior — only the last definition is used. Generic handler names make it impossible to understand what a 'notify' trigger will do.
    match_type: duplicate_handler_names
    example_bad: |
      handlers:
        - name: restart
          ansible.builtin.service:
            name: nginx
            state: restarted
    example_good: |
      handlers:
        - name: Restart nginx after config change
          ansible.builtin.service:
            name: nginx
            state: restarted

  - id: ANS-IDE-006
    name: Playbooks must not exceed 150 lines
    severity: warning
    description: Playbooks longer than 150 lines should be split into roles or imported task files.
    rationale: Long playbooks become difficult to read, test, and maintain. Splitting into roles promotes reuse and follows single-responsibility principles.
    match_type: file_length
    max_lines: 150
    example_good: |
      # Split large playbooks using:
      - ansible.builtin.import_tasks: tasks/install.yml
      - ansible.builtin.import_tasks: tasks/configure.yml

  - id: ANS-IDE-007
    name: Use 'block' for grouping related tasks and error handling
    severity: info
    description: Group logically related tasks using 'block' and provide 'rescue' sections for error handling instead of scattered ignore_errors.
    rationale: Blocks make logical grouping explicit and allow proper try/catch-style error handling with rescue and always sections.
    match_type: regex
    target: any
    pattern: "ignore_errors:\\s*(true|yes)"
    flags: IGNORECASE
    example_good: |
      - block:
          - name: Attempt risky operation
            ansible.builtin.command: /usr/bin/risky-op
        rescue:
          - name: Handle failure gracefully
            ansible.builtin.debug:
              msg: "Risky op failed, rolling back"
