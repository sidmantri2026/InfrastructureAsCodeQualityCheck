category: Bash - Error Handling
technology: bash
description: >
  Error handling rules for Linux bash shell scripts.
  Covers exit code checking, trap usage, logging, graceful failure,
  and patterns that silently swallow errors making scripts unreliable.
rules:

  - id: BASH-ERR-001
    name: Scripts must use set -e (errexit)
    severity: error
    description: "Every script must include 'set -e' or 'set -o errexit' to exit immediately when a command returns a non-zero exit code."
    rationale: "Without 'set -e', a script continues executing after a command failure. This means subsequent commands may run against a broken or partially-configured state, often causing cascading failures that are much harder to diagnose."
    match_type: file_missing_pattern
    required_pattern: "set\\s+-[a-zA-Z]*e[a-zA-Z]*|set\\s+-o\\s+errexit"
    search_lines: 20
    example_bad: |
      #!/usr/bin/env bash
      # No errexit — script continues after failures
      deploy_app
      run_migrations
    example_good: |
      #!/usr/bin/env bash
      set -euo pipefail
      deploy_app
      run_migrations

  - id: BASH-ERR-002
    name: Scripts must use set -u (nounset)
    severity: error
    description: "Every script must include 'set -u' or 'set -o nounset' to treat unset variables as errors."
    rationale: 'Without ''set -u'', referencing an unset variable silently expands to an empty string. This causes subtle bugs — for example, ''rm -rf \$PREFIX/'' becomes ''rm -rf /'' if PREFIX is unset.'
    match_type: file_missing_pattern
    required_pattern: "set\\s+-[a-zA-Z]*u[a-zA-Z]*|set\\s+-o\\s+nounset"
    search_lines: 20
    example_bad: |
      #!/usr/bin/env bash
      set -e
      rm -rf "$DEPLOY_DIR/old"   # DEPLOY_DIR unset = rm -rf /old
    example_good: |
      #!/usr/bin/env bash
      set -euo pipefail
      rm -rf "$DEPLOY_DIR/old"   # fails safely if DEPLOY_DIR is unset

  - id: BASH-ERR-003
    name: Scripts must use set -o pipefail
    severity: error
    description: "Every script must include 'set -o pipefail' so that pipeline failures are not masked by the last command's exit code."
    rationale: "Without pipefail, 'failing_cmd | tee output.log' returns exit code 0 because tee succeeded. The failure of failing_cmd is silently ignored. pipefail makes any pipeline fail if any command in it fails."
    match_type: file_missing_pattern
    required_pattern: "set\\s+-o\\s+pipefail|set\\s+-[a-zA-Z]*e[a-zA-Z]*o pipefail"
    search_lines: 20
    example_bad: |
      #!/usr/bin/env bash
      set -eu
      # pipefail missing — pipeline failure silently ignored
      get_config | validate_config | apply_config
    example_good: |
      #!/usr/bin/env bash
      set -euo pipefail
      get_config | validate_config | apply_config

  - id: BASH-ERR-004
    name: Use trap to handle unexpected exits and signals
    severity: error
    description: "Scripts must define a trap for EXIT and ERR signals to perform cleanup and log failures gracefully."
    rationale: "Without a trap, a script that exits unexpectedly (e.g. from 'set -e') leaves no trace of where it failed, and any temporary resources are not cleaned up. Traps ensure consistent cleanup and error reporting."
    match_type: file_missing_pattern
    required_pattern: "trap\\s+['\"]?.*(EXIT|ERR|SIGTERM)"
    search_lines: 30
    example_bad: |
      #!/usr/bin/env bash
      set -euo pipefail
      TMPFILE=$(mktemp)
      do_work "$TMPFILE"
      # If do_work fails, TMPFILE is never cleaned up
    example_good: |
      #!/usr/bin/env bash
      set -euo pipefail

      cleanup() {
        local exit_code=$?
        rm -f "$TMPFILE"
        if [[ $exit_code -ne 0 ]]; then
          echo "ERROR: Script failed at line $BASH_LINENO with exit code $exit_code" >&2
        fi
      }
      trap cleanup EXIT

      TMPFILE=$(mktemp)
      do_work "$TMPFILE"

  - id: BASH-ERR-005
    name: Error messages must be written to stderr
    severity: warning
    description: "Error and warning messages must be written to stderr (>&2), not stdout. Stdout is for data output only."
    rationale: "Writing errors to stdout mixes them with data output, breaking pipelines and making it impossible for callers to separate results from error messages. stderr is the correct channel for diagnostics."
    match_type: regex
    target: any
    pattern: "echo\\s+.*[Ee][Rr][Rr][Oo][Rr]|echo\\s+.*[Ff][Aa][Ii][Ll][Ee][Dd]|echo\\s+.*[Ww][Aa][Rr][Nn][Ii][Nn][Gg]"
    exclude_pattern: "#|>&2|2>&1|\\$\\(|\\bif\\b"
    example_bad: |
      echo "ERROR: Configuration file not found"
      echo "WARNING: Retrying connection..."
    example_good: |
      echo "ERROR: Configuration file not found" >&2
      echo "WARNING: Retrying connection..." >&2

  - id: BASH-ERR-006
    name: Check exit code of critical commands explicitly
    severity: error
    description: "Critical commands (ssh, scp, rsync, curl, ansible-playbook) must have their exit codes explicitly handled with '|| exit', '|| return', or a conditional check."
    rationale: "Even with 'set -e', some commands produce non-zero exit codes in expected conditions (e.g. grep returns 1 when no match). Explicit handling makes intent clear and provides informative error messages."
    match_type: regex
    target: any
    pattern: "^\\s*(ssh|scp|rsync|ansible-playbook|terraform|kubectl)\\s+(?!.*\\|\\||.*&&|.*if)"
    exclude_pattern: "#"
    example_bad: |
      ssh "$REMOTE_HOST" "systemctl restart myapp"
      rsync -av "$SOURCE/" "$DEST/"
    example_good: |
      ssh "$REMOTE_HOST" "systemctl restart myapp" \
        || { echo "ERROR: Remote restart failed on $REMOTE_HOST" >&2; exit 1; }
      rsync -av "$SOURCE/" "$DEST/" \
        || { echo "ERROR: rsync failed from $SOURCE to $DEST" >&2; exit 1; }

  - id: BASH-ERR-007
    name: Functions must return meaningful exit codes
    severity: warning
    description: "Functions that can fail must explicitly return a non-zero exit code on failure using 'return 1' (or a specific code). Do not rely on the implicit exit code of the last command."
    rationale: "Functions that always return 0 (success) regardless of outcome make it impossible for callers to detect failures. Explicit return codes allow calling code to use 'if my_function; then ...' patterns reliably."
    match_type: regex
    target: any
    pattern: "^\\}$"
    require_nearby: "return\\s+[1-9]|return\\s+\\$"
    example_bad: |
      validate_config() {
        if [[ ! -f "$CONFIG_FILE" ]]; then
          echo "Config missing" >&2
          # No return — function returns 0 (success) even on failure
        fi
      }
    example_good: |
      validate_config() {
        if [[ ! -f "$CONFIG_FILE" ]]; then
          echo "ERROR: Config missing: $CONFIG_FILE" >&2
          return 1
        fi
        return 0
      }

  - id: BASH-ERR-008
    name: Use errexit-safe conditional patterns
    severity: warning
    description: "Do not use '! command' or 'command && ...' as the only form of error checking when set -e is active — use explicit if/then blocks."
    rationale: "With 'set -e', a negated command '! failing_cmd' suppresses the exit-on-error behaviour. This creates an inconsistency where errors inside negated commands are silently ignored, against the intent of 'set -e'."
    match_type: regex
    target: any
    pattern: "^\\s*!\\s+(grep|test|\\[|find|command)\\s+"
    exclude_pattern: "#|if\\s+!|while\\s+!"
    example_bad: |
      ! grep -q "started" "$LOG_FILE"
      echo "Service not yet started"
    example_good: |
      if ! grep -q "started" "$LOG_FILE"; then
        echo "Service not yet started"
      fi

  - id: BASH-ERR-009
    name: Log script start, end, and key milestones
    severity: info
    description: "Scripts should log their start time, key milestones, and end time with exit status to aid in debugging and audit trails."
    rationale: "Without logging, a failed automated script run leaves no trace of what happened and how far it got. Structured log messages with timestamps are essential for post-failure diagnosis in CI/CD and production environments."
    match_type: file_missing_pattern
    required_pattern: "echo.*\\$\\(date|logger\\s+|printf.*date"
    search_lines: 50
    example_bad: |
      #!/usr/bin/env bash
      set -euo pipefail
      deploy_app
      run_migrations
      restart_services
    example_good: |
      #!/usr/bin/env bash
      set -euo pipefail
      echo "[$(date '+%Y-%m-%d %H:%M:%S')] INFO: Starting deployment"
      deploy_app
      echo "[$(date '+%Y-%m-%d %H:%M:%S')] INFO: Running migrations"
      run_migrations
      echo "[$(date '+%Y-%m-%d %H:%M:%S')] INFO: Deployment complete"

  - id: BASH-ERR-010
    name: Validate required environment variables at script start
    severity: error
    description: "Scripts must validate that all required environment variables are set and non-empty at the start, before any operations are performed."
    rationale: "Discovering a missing environment variable halfway through a script can leave the system in a partially-configured state. Fail fast at the start with a clear error message listing which variables are missing."
    match_type: file_missing_pattern
    required_pattern: ":-\\}|\\$\\{[A-Z_]+:?\\?|\\[\\[\\s+-z\\s+\"|\\[\\s+-z\\s+\""
    search_lines: 30
    example_bad: |
      #!/usr/bin/env bash
      set -euo pipefail
      # No validation — discovers missing vars mid-run
      deploy_to "$DEPLOY_ENV" version "$APP_VERSION"
    example_good: |
      #!/usr/bin/env bash
      set -euo pipefail

      : "${DEPLOY_ENV:?ERROR: DEPLOY_ENV must be set}"
      : "${APP_VERSION:?ERROR: APP_VERSION must be set}"
      : "${REMOTE_HOST:?ERROR: REMOTE_HOST must be set}"

      deploy_to "$DEPLOY_ENV" version "$APP_VERSION"

  - id: BASH-ERR-011
    name: Retry logic required for network operations
    severity: info
    description: "Network operations (curl, wget, ssh, scp) in production scripts should include retry logic with a maximum attempt count and backoff."
    rationale: "Network operations fail transiently in production (DNS blips, rate limits, brief service interruptions). Scripts without retries fail the entire deployment for temporary issues that would self-resolve. Implement retries with exponential backoff."
    match_type: regex
    target: any
    pattern: "^\\s*(curl|wget)\\s+https?://"
    exclude_pattern: "#|for\\s+i|while\\s+|retry|RETRY|attempt|ATTEMPT|--retry"
    example_bad: |
      curl -o /tmp/package.tar.gz https://releases.example.com/package-1.0.tar.gz
    example_good: |
      for attempt in 1 2 3; do
        curl -o /tmp/package.tar.gz https://releases.example.com/package-1.0.tar.gz && break
        echo "WARNING: Download attempt $attempt failed, retrying..." >&2
        sleep $((attempt * 5))
      done
