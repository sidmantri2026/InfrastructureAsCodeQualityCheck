category: Naming Conventions
technology: ansible
description: Rules governing naming standards for tasks, plays, variables, and files.
rules:

  - id: ANS-NAM-001
    name: Tasks must have a name
    severity: error
    description: Every task must include a descriptive 'name' field. Unnamed tasks are impossible to identify in logs and make debugging very difficult.
    rationale: Without names, ansible-playbook output shows cryptic module names (e.g. "TASK [ansible.builtin.copy]") making it impossible to understand what is happening during a run.
    match_type: yaml_key_missing
    context: task
    required_key: name
    example_bad: |
      - copy:
          src: foo.conf
          dest: /etc/foo.conf
    example_good: |
      - name: Copy foo configuration to /etc
        copy:
          src: foo.conf
          dest: /etc/foo.conf

  - id: ANS-NAM-002
    name: Task names must not be generic
    severity: warning
    description: Task names should be descriptive and unique. Avoid generic names like "task", "run", "execute", "do this".
    rationale: Generic names give no context about what the task does. A developer reading logs should instantly understand what happened.
    match_type: regex
    target: task_name
    pattern: "^(task|run|execute|step|do|action|item|thing)\\s*\\d*$"
    flags: IGNORECASE
    example_bad: |
      - name: task
    example_good: |
      - name: Install nginx web server package

  - id: ANS-NAM-003
    name: Variable names must use snake_case
    severity: error
    description: All variable names must use lowercase snake_case. No camelCase, PascalCase, or hyphens.
    rationale: Consistent naming prevents subtle bugs. Ansible variables are case-sensitive and mixing conventions causes unpredictable behavior.
    match_type: regex
    target: variable_definition
    pattern: "[a-z][a-zA-Z]*[A-Z][a-zA-Z]*:|[a-zA-Z]+-[a-zA-Z]+\\s*:"
    example_bad: |
      vars:
        webServerPort: 8080
        db-password: secret
    example_good: |
      vars:
        web_server_port: 8080
        db_password: secret

  - id: ANS-NAM-004
    name: Role names must use snake_case
    severity: warning
    description: Role names should use snake_case and be descriptive of their purpose.
    rationale: Consistent role naming makes the codebase navigable and roles reusable across projects.
    match_type: regex
    target: role_reference
    pattern: "role:\\s+[a-zA-Z][a-zA-Z0-9]*[A-Z]"
    example_bad: |
      roles:
        - webServer
    example_good: |
      roles:
        - web_server

  - id: ANS-NAM-005
    name: Play names must be present and descriptive
    severity: error
    description: Every play in a playbook must have a 'name' field describing its purpose.
    rationale: Play names appear in output and are essential for understanding execution flow in multi-play playbooks.
    match_type: play_name_missing
    example_bad: |
      - hosts: webservers
        tasks: []
    example_good: |
      - name: Configure nginx webservers
        hosts: webservers
        tasks: []
