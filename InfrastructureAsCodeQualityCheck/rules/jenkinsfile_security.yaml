category: Jenkinsfile - Security
technology: jenkinsfile
description: >
  Security rules for Jenkins pipelines.
  Covers credential handling, script approval, injection prevention,
  agent hardening, and access control patterns.
rules:

  - id: JNK-SEC-001
    name: No hardcoded credentials in Jenkinsfile
    severity: critical
    description: "Passwords, tokens, API keys, and secrets must never be hardcoded in Jenkinsfile. Use Jenkins Credentials Store with credentials() binding."
    rationale: "Jenkinsfiles are stored in source control and visible to everyone with repo access. Hardcoded credentials are exposed to all developers, auditors, and anyone who can read the repository — including after rotation."
    match_type: regex
    target: any
    pattern: "(password|passwd|token|secret|api_key|apikey|access_key)\\s*[=:]\\s*['\"][A-Za-z0-9+/!@#$%^&*]{8,}['\"]"
    flags: IGNORECASE
    exclude_pattern: "//|credentials\\(|withCredentials|\\$\\{|params\\."
    example_bad: |
      environment {
        DB_PASSWORD = 'MyS3cr3tPass!'
        API_TOKEN   = 'ghp_abc123xyz789'
      }
    example_good: |
      environment {
        DB_PASSWORD = credentials('prod-db-password')
        API_TOKEN   = credentials('github-api-token')
      }

  - id: JNK-SEC-002
    name: Use withCredentials for credential injection
    severity: error
    description: "All credential values must be injected via withCredentials() block. Never pass credentials as environment variable strings."
    rationale: "withCredentials() masks credential values in logs automatically. Direct string injection appears in console output, build logs, and Blue Ocean — visible to anyone with read access to the build."
    match_type: regex
    target: any
    pattern: "sh\\s+['\"].*\\$\\{?[A-Z_]*(PASSWORD|TOKEN|SECRET|KEY|PASS)[A-Z_]*\\}?"
    exclude_pattern: "//|withCredentials|credentials\\("
    example_bad: |
      sh "curl -H 'Authorization: Bearer ${API_TOKEN}' https://api.example.com/deploy"
    example_good: |
      withCredentials([string(credentialsId: 'api-token', variable: 'API_TOKEN')]) {
        sh 'curl -H "Authorization: Bearer $API_TOKEN" https://api.example.com/deploy'
      }

  - id: JNK-SEC-003
    name: Do not use JENKINS_URL or BUILD_URL in shell commands unsanitised
    severity: warning
    description: "Jenkins built-in variables (BUILD_URL, JOB_NAME, BRANCH_NAME) used inside sh steps must be treated as untrusted input and not interpolated directly into shell commands."
    rationale: "Jenkins environment variable values can be influenced by branch names, PR titles, or external triggers. Interpolating them unsanitised into shell commands creates potential injection vulnerabilities."
    match_type: regex
    target: any
    pattern: "sh\\s+['\"].*\\$\\{?(JOB_NAME|BRANCH_NAME|CHANGE_TITLE|CHANGE_AUTHOR)\\}?"
    exclude_pattern: "//|echo|printf"
    example_bad: |
      sh "git tag -a ${BRANCH_NAME} -m 'Release'"
    example_good: |
      sh "git tag -a '${env.BRANCH_NAME.replaceAll('[^a-zA-Z0-9._-]', '_')}' -m 'Release'"

  - id: JNK-SEC-004
    name: Production deployments require manual approval
    severity: error
    description: "Any stage that deploys to production must include an input step requiring manual approval before execution."
    rationale: "Automated deployment to production without a human gate is a significant operational risk. An input step creates an audit trail of who approved each production deployment."
    match_type: regex
    target: any
    pattern: "stage\\s*\\(['\"][^'\"]*[Pp]rod[^'\"]*['\"]"
    require_nearby: "input\\s*\\("
    exclude_pattern: "//"
    example_bad: |
      stage('Deploy to Production') {
        steps {
          sh './deploy.sh --env=prod'
        }
      }
    example_good: |
      stage('Deploy to Production') {
        steps {
          input message: 'Approve production deployment?', ok: 'Deploy',
                submitter: 'release-managers'
          sh './deploy.sh --env=prod'
        }
      }

  - id: JNK-SEC-005
    name: Use specific Docker image tags, not latest
    severity: error
    description: "Docker image references in pipeline agent or step directives must use specific version tags, never 'latest' or no tag."
    rationale: "Using 'latest' means the image can change between builds, making them non-reproducible. A new 'latest' could introduce breaking changes, vulnerabilities, or different tooling versions silently."
    match_type: regex
    target: any
    pattern: "image\\s*:\\s*['\"][a-zA-Z0-9/_-]+:latest['\"]|image\\s*:\\s*['\"][a-zA-Z0-9/_-]+['\"](?!.*:)"
    exclude_pattern: "//"
    example_bad: |
      agent {
        docker { image 'maven:latest' }
      }
    example_good: |
      agent {
        docker { image 'maven:3.9.4-eclipse-temurin-17' }
      }

  - id: JNK-SEC-006
    name: Do not run pipeline as root in Docker agents
    severity: error
    description: "Docker agent containers must not run as root. Use the reuseNode setting with a non-root user or specify args with --user."
    rationale: "Running build processes as root inside a container means any compromised build step has root-equivalent access to the container filesystem. Always use a non-root user for build agents."
    match_type: regex
    target: any
    pattern: "docker\\s*\\{[^}]*args\\s+['\"][^'\"]*--user\\s+root"
    exclude_pattern: "//"
    example_bad: |
      agent {
        docker {
          image 'build-tools:1.0'
          args '--user root'
        }
      }
    example_good: |
      agent {
        docker {
          image 'build-tools:1.0'
          args '--user 1000:1000'
        }
      }

  - id: JNK-SEC-007
    name: Avoid using script block to bypass declarative constraints
    severity: warning
    description: "Minimise the use of script { } blocks in declarative pipelines. Logic in script blocks bypasses pipeline syntax validation and is harder to audit."
    rationale: "script { } blocks allow arbitrary Groovy code that bypasses declarative validation, In-process script approval, and makes the pipeline harder to audit for security issues. Prefer declarative steps where possible."
    match_type: regex
    target: any
    pattern: "^\\s*script\\s*\\{"
    exclude_pattern: "//"
    example_bad: |
      steps {
        script {
          def result = sh(script: "complex logic", returnStdout: true)
          // 50 lines of Groovy
        }
      }
    example_good: |
      steps {
        sh './scripts/complex_logic.sh'
      }

  - id: JNK-SEC-008
    name: Pipeline must not disable concurrent build protection without explicit reason
    severity: warning
    description: "If disableConcurrentBuilds() is not set, document why concurrent runs are safe. Concurrent pipeline runs sharing resources can cause race conditions."
    rationale: "Concurrent pipeline runs sharing workspaces, files, or external resources cause race conditions and data corruption. Use disableConcurrentBuilds() or ensure stages are truly concurrent-safe."
    match_type: file_missing_pattern
    required_pattern: "disableConcurrentBuilds|lockable-resources|lock\\s*\\("
    search_lines: 999
    example_bad: |
      pipeline {
        agent any
        options {
          timeout(time: 30, unit: 'MINUTES')
        }
    example_good: |
      pipeline {
        agent any
        options {
          timeout(time: 30, unit: 'MINUTES')
          disableConcurrentBuilds()
        }
