category: Bash - Hardcoding & Sensitive Data
technology: bash
description: >
  Rules preventing hardcoded values and sensitive data exposure in bash scripts.
  Covers IP addresses, hostnames, ports, credentials, account names, paths,
  and patterns that log or expose sensitive runtime data.
rules:

  - id: BASH-HARD-001
    name: No hardcoded IP addresses
    severity: error
    description: "IP addresses must not be hardcoded in shell scripts. Use environment variables or configuration files."
    rationale: "Hardcoded IP addresses break scripts when infrastructure changes and expose internal network topology in source control. They also differ between environments, preventing script reuse."
    match_type: regex
    target: any
    pattern: "(?<![0-9.])(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(?![0-9.])"
    exclude_pattern: "#|0\\.0\\.0\\.0|127\\.0\\.0\\.1|255\\.255\\.255|grep|sed|awk|regex|\\$\\{"
    example_bad: |
      DB_HOST="192.168.10.45"
      ssh admin@10.20.30.40
    example_good: |
      DB_HOST="${DB_HOST:?DB_HOST must be set}"
      ssh "admin@${REMOTE_HOST:?REMOTE_HOST must be set}"

  - id: BASH-HARD-002
    name: No hardcoded hostnames or FQDNs
    severity: error
    description: "Server hostnames and FQDNs must not be hardcoded in shell scripts. Use environment variables."
    rationale: "Hostnames differ between environments and change when infrastructure is rebuilt. Hardcoded hostnames require code changes instead of configuration changes."
    match_type: regex
    target: any
    pattern: "(?:ssh|scp|rsync|curl|wget|nc|telnet)\\s+[a-zA-Z][a-zA-Z0-9._-]*\\.(internal|local|corp|prod|dev|staging|example\\.com)"
    exclude_pattern: "#|\\$\\{|\\$[A-Z_]"
    example_bad: |
      ssh deploy@appserver01.prod.example.com
      curl https://api.prod.internal/health
    example_good: |
      ssh "deploy@${APP_SERVER:?APP_SERVER must be set}"
      curl "https://${API_HOST:?API_HOST must be set}/health"

  - id: BASH-HARD-003
    name: No hardcoded port numbers
    severity: warning
    description: "Port numbers must not be hardcoded in shell scripts. Declare them as named variables at the top of the script."
    rationale: "Port numbers change during security hardening, when running multiple instances, and between environments. Named variables make them easy to find and change centrally."
    match_type: regex
    target: any
    pattern: "(--port|-p|:)\\s*(?!\\$)\\b(22|80|443|3306|5432|6379|8080|8443|9200|27017|5601)\\b"
    exclude_pattern: "#|\\$\\{|\\$[A-Z_]|chmod|kill|sleep|exit"
    example_bad: |
      curl http://localhost:8080/health
      nc -zv "$DB_HOST" 3306
    example_good: |
      readonly APP_PORT="${APP_PORT:-8080}"
      readonly DB_PORT="${DB_PORT:-3306}"
      curl "http://localhost:${APP_PORT}/health"
      nc -zv "$DB_HOST" "$DB_PORT"

  - id: BASH-HARD-004
    name: No hardcoded usernames or account names
    severity: error
    description: "System usernames, service account names, and remote login users must not be hardcoded. Use environment variables."
    rationale: "Username conventions differ between organisations and environments. Hardcoding a specific username creates an implicit dependency on that account existing with that exact name."
    match_type: regex
    target: any
    pattern: "(ssh|scp|rsync)\\s+[a-z][a-z0-9_-]{1,31}@|sudo\\s+-u\\s+[a-z][a-z0-9_-]+\\s+|runuser\\s+-[lu]\\s+[a-z][a-z0-9_-]+"
    exclude_pattern: "#|\\$\\{|\\$[A-Z_]|\\$USER|\\$SUDO_USER"
    example_bad: |
      ssh deployer@"${REMOTE_HOST}"
      sudo -u appservice ./start.sh
    example_good: |
      ssh "${DEPLOY_USER:?DEPLOY_USER must be set}@${REMOTE_HOST}"
      sudo -u "${APP_SERVICE_ACCOUNT:?}" ./start.sh

  - id: BASH-HARD-005
    name: No hardcoded file system paths
    severity: warning
    description: "Base deployment paths, application directories, and log directories must use variables, not hardcoded strings."
    rationale: "Deployment paths differ between servers, organisations, and environments. Hardcoded paths prevent script reuse and require editing scripts rather than changing configuration."
    match_type: regex
    target: any
    pattern: "(?:cd|cp|mv|rm|ls|cat|mkdir|chmod|chown|ln)\\s+[^$\"'\\s]*/(opt|home|srv|data|app)/[a-zA-Z][a-zA-Z0-9/_-]{5,}"
    exclude_pattern: "#|\\$\\{|\\$[A-Z_]"
    example_bad: |
      cd /opt/mycompany/myapp
      cp ./myapp.jar /opt/mycompany/myapp/bin/
    example_good: |
      readonly APP_DIR="${APP_DIR:-/opt/myapp}"
      cd "$APP_DIR"
      cp ./myapp.jar "${APP_DIR}/bin/"

  - id: BASH-HARD-006
    name: No hardcoded credentials or secrets in variable assignments
    severity: critical
    description: "Passwords, tokens, API keys, and any secret values must never appear as hardcoded string values in variable assignments."
    rationale: "Hardcoded secrets in scripts are committed to source control, visible in process listings (ps aux), stored in shell history, and appear in CI/CD logs. They must come from a secrets manager or environment."
    match_type: regex
    target: any
    pattern: "^\\s*(?:readonly\\s+|export\\s+|local\\s+)?[A-Z_]*(PASSWORD|TOKEN|SECRET|API_KEY|AUTH|CREDENTIAL)[A-Z_]*=['\"]?[^$\\s'\"{][^'\";]{5,}"
    flags: IGNORECASE
    exclude_pattern: "#|\\$\\{|\\$\\(|changeme|example|YOUR_|<|>|\\*|PLACEHOLDER"
    example_bad: |
      readonly DB_PASSWORD="MyS3cr3tPass!"
      export API_TOKEN="ghp_abc123xyz789"
    example_good: |
      readonly DB_PASSWORD="${VAULT_DB_PASSWORD:?DB_PASSWORD must be set}"
      export API_TOKEN="${SECRETS_API_TOKEN:?API_TOKEN must be set}"

  - id: BASH-HARD-007
    name: Do not log sensitive variable values
    severity: error
    description: "Echo or printf statements must not print the values of variables that contain credentials, tokens, or passwords."
    rationale: "Log messages containing credential values appear in CI/CD logs, terminal history, and log files. They are often stored indefinitely and accessible to a much wider audience than intended."
    match_type: regex
    target: any
    pattern: "(echo|printf)\\s+.*\\$\\{?(PASSWORD|TOKEN|SECRET|API_KEY|AUTH_KEY|PRIVATE_KEY)\\}?"
    flags: IGNORECASE
    exclude_pattern: "#|>&2|unset|\\[\\["
    example_bad: |
      echo "Using password: $DB_PASSWORD"
      printf "API token: %s\n" "$API_TOKEN"
    example_good: |
      echo "Connecting to database as $DB_USER"
      # Never log the credential value itself

  - id: BASH-HARD-008
    name: No hardcoded AWS account IDs or cloud resource identifiers
    severity: critical
    description: "AWS account IDs, subscription IDs, resource ARNs, and cloud-specific identifiers must not be hardcoded. Use environment variables."
    rationale: "Cloud account IDs and ARNs are environment-specific and sensitive. Hardcoding them prevents environment promotion and exposes your cloud account structure in source control."
    match_type: regex
    target: any
    pattern: "arn:aws:[a-z0-9-]+:[a-z0-9-]*:[0-9]{12}:|['\"][0-9]{12}['\"]"
    exclude_pattern: "#|\\$\\{|\\$[A-Z_]"
    example_bad: |
      aws sts assume-role --role-arn arn:aws:iam::123456789012:role/DeployRole
      ACCOUNT_ID="123456789012"
    example_good: |
      aws sts assume-role --role-arn "${DEPLOY_ROLE_ARN:?DEPLOY_ROLE_ARN must be set}"
      ACCOUNT_ID="${AWS_ACCOUNT_ID:?}"

  - id: BASH-HARD-009
    name: Mask sensitive values before logging to files
    severity: error
    description: "When writing logs that may include sensitive context, mask or omit credential values. Use a logging function that strips sensitive fields."
    rationale: "Log files are often retained long-term, shipped to log aggregators, and accessible to a wide audience. Sensitive values written to log files can persist for months or years after rotation."
    match_type: regex
    target: any
    pattern: "(echo|printf|logger).*\\$\\{?(DB_PASSWORD|API_TOKEN|SECRET|PRIVATE_KEY)\\}?.*>>\\s*/var/log"
    flags: IGNORECASE
    exclude_pattern: "#"
    example_bad: |
      echo "$(date): Connecting with password $DB_PASSWORD" >> /var/log/deploy.log
    example_good: |
      echo "$(date): Connecting to $DB_HOST as $DB_USER" >> /var/log/deploy.log
