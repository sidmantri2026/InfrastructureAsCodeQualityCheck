category: Cloud Security - Azure
technology: ansible
source: KICS by Checkmarx (https://github.com/Checkmarx/kics)
description: >
  Security rules derived from KICS covering Azure and GCP misconfigurations
  in Ansible playbooks, plus Ansible configuration file (ansible.cfg) security issues.
rules:

  # ─── AZURE ────────────────────────────────────────────────────────────────

  - id: ANS-KICS-AZ-001
    name: SQLServer Ingress From Any IP
    severity: critical
    category: Cloud Security - Azure
    description: "Azure SQL Server firewall rules must not allow access from all IP addresses (0.0.0.0 to 255.255.255.255)."
    rationale: "Allowing all IPs to reach a SQL Server exposes it to brute-force, injection, and exploitation attacks from the entire internet."
    kics_id: f4e9ff70-0f3b-4c50-a713-26cbe7ec4039
    match_type: regex
    target: any
    pattern: "(start_ip_address:\\s*['\"]?0\\.0\\.0\\.0|end_ip_address:\\s*['\"]?255\\.255\\.255\\.255)"
    flags: IGNORECASE
    example_bad: |
      - name: Create SQL firewall rule
        azure.azcollection.azure_rm_sqlfirewallrule:
          start_ip_address: 0.0.0.0
          end_ip_address: 255.255.255.255
    example_good: |
      - name: Create SQL firewall rule
        azure.azcollection.azure_rm_sqlfirewallrule:
          start_ip_address: 10.0.0.1
          end_ip_address: 10.0.0.50

  - id: ANS-KICS-AZ-002
    name: Storage Account Not Forcing HTTPS
    severity: error
    category: Cloud Security - Azure
    description: "Azure Storage accounts must enforce HTTPS-only access. Set https_only to true."
    rationale: "Without HTTPS enforcement, clients can connect over unencrypted HTTP, exposing data in transit to interception. All storage traffic must be encrypted."
    kics_id: 2c99a474-2a3c-4c17-8294-53ffa5ed0522
    match_type: regex
    target: any
    pattern: "https_only:\\s*(false|no)"
    flags: IGNORECASE
    example_bad: |
      - name: Create storage account
        azure.azcollection.azure_rm_storageaccount:
          https_only: false
    example_good: |
      - name: Create storage account
        azure.azcollection.azure_rm_storageaccount:
          https_only: true

  - id: ANS-KICS-AZ-003
    name: Storage Account Not Using Latest TLS Version
    severity: error
    category: Cloud Security - Azure
    description: "Azure Storage accounts must require a minimum TLS version of TLS1_2."
    rationale: "TLS 1.0 and 1.1 have known vulnerabilities (BEAST, POODLE, etc.) and are deprecated. Enforce TLS 1.2 minimum to prevent downgrade attacks."
    kics_id: c62746cf-92d5-4649-9acf-7d48d086f2ee
    match_type: regex
    target: any
    pattern: "minimum_tls_version:\\s*['\"]?(TLS1_0|TLS1_1)['\"]?"
    flags: IGNORECASE
    example_bad: |
      - name: Create storage account
        azure.azcollection.azure_rm_storageaccount:
          minimum_tls_version: TLS1_0
    example_good: |
      - name: Create storage account
        azure.azcollection.azure_rm_storageaccount:
          minimum_tls_version: TLS1_2

  - id: ANS-KICS-AZ-004
    name: Storage Container Is Publicly Accessible
    severity: critical
    category: Cloud Security - Azure
    description: "Azure storage containers must not have public_access set to container or blob."
    rationale: "Public blob containers expose all stored data to anonymous internet access without authentication. This is a common cause of data leakage incidents."
    kics_id: 4d3817db-dd35-4de4-a80d-3867157e7f7f
    match_type: regex
    target: any
    pattern: "public_access:\\s*['\"]?(container|blob)['\"]?"
    flags: IGNORECASE
    example_bad: |
      - name: Create storage container
        azure.azcollection.azure_rm_storageblob:
          public_access: container
    example_good: |
      - name: Create storage container
        azure.azcollection.azure_rm_storageblob:
          public_access: none

  - id: ANS-KICS-AZ-005
    name: MySQL SSL Connection Disabled
    severity: error
    category: Cloud Security - Azure
    description: "Azure MySQL server must enforce SSL connections. Set enforce_ssl to true in server configuration."
    rationale: "Disabling SSL for database connections exposes credentials and query data to network interception. Database connections must always be encrypted."
    kics_id: 2a901825-0f3b-4655-a0fe-e0470e50f8e6
    match_type: regex
    target: any
    pattern: "(ssl_enforcement|enforce_ssl):\\s*(Disabled|false|no)"
    flags: IGNORECASE
    example_bad: |
      - name: Create MySQL server
        azure.azcollection.azure_rm_mysqlserver:
          enforce_ssl: false
    example_good: |
      - name: Create MySQL server
        azure.azcollection.azure_rm_mysqlserver:
          enforce_ssl: true

  - id: ANS-KICS-AZ-006
    name: Web App Accepting Traffic Other Than HTTPS
    severity: error
    category: Cloud Security - Azure
    description: "Azure Web Apps must only accept HTTPS traffic. Set https_only to true."
    rationale: "Allowing HTTP traffic exposes users to session hijacking, credential interception, and man-in-the-middle attacks. All web traffic must be HTTPS."
    kics_id: eb8c2560-8bee-4248-9d0d-e80c8641dd91
    match_type: regex
    target: any
    pattern: "(azure_rm_webapp|azurerm_app_service).*\\n(.*\\n){0,10}.*https_only:\\s*(false|no)"
    flags: IGNORECASE
    example_bad: |
      - name: Create web app
        azure.azcollection.azure_rm_webapp:
          https_only: false
    example_good: |
      - name: Create web app
        azure.azcollection.azure_rm_webapp:
          https_only: true

  - id: ANS-KICS-AZ-007
    name: Azure Instance Using Basic Authentication
    severity: error
    category: Cloud Security - Azure
    description: "Azure Linux VMs must disable password authentication and use SSH key pairs only."
    rationale: "Password-based SSH authentication is vulnerable to brute-force attacks. SSH key authentication is far more secure and should always be used for Azure VMs."
    kics_id: e2d834b7-8b25-4935-af53-4a60668dcbe0
    match_type: regex
    target: any
    pattern: "disable_password_authentication:\\s*(false|no)"
    flags: IGNORECASE
    example_bad: |
      - name: Create Linux VM
        azure.azcollection.azure_rm_virtualmachine:
          linux_config:
            disable_password_authentication: false
    example_good: |
      - name: Create Linux VM
        azure.azcollection.azure_rm_virtualmachine:
          linux_config:
            disable_password_authentication: true
            ssh_public_keys:
              - path: /home/azureuser/.ssh/authorized_keys
                key_data: "{{ ssh_public_key }}"

  - id: ANS-KICS-AZ-008
    name: AKS RBAC Disabled
    severity: error
    category: Cloud Security - Azure
    description: "Azure Kubernetes Service clusters must have RBAC enabled for access control."
    rationale: "Without RBAC, all authenticated users have the same level of access to the cluster, making it impossible to enforce least-privilege access to Kubernetes resources."
    kics_id: 149fa56c-4404-4f90-9e25-d34b676d5b39
    match_type: regex
    target: any
    pattern: "enable_rbac:\\s*(false|no)"
    flags: IGNORECASE
    example_bad: |
      - name: Create AKS cluster
        azure.azcollection.azure_rm_aks:
          enable_rbac: false
    example_good: |
      - name: Create AKS cluster
        azure.azcollection.azure_rm_aks:
          enable_rbac: true

  # ─── GCP ──────────────────────────────────────────────────────────────────

  - id: ANS-KICS-GCP-001
    name: SQL DB Instance With SSL Disabled
    severity: critical
    category: Cloud Security - GCP
    description: "GCP Cloud SQL instances must require SSL for all connections. Set require_ssl to true."
    rationale: "Without SSL enforcement, database credentials and query data are transmitted in plaintext over the network, vulnerable to interception."
    kics_id: d0f7da39-a2d5-4c78-bb85-4b7f338b3cbb
    match_type: regex
    target: any
    pattern: "require_ssl:\\s*(false|no)"
    flags: IGNORECASE
    example_bad: |
      - name: Create Cloud SQL instance
        google.cloud.gcp_sql_instance:
          settings:
            ip_configuration:
              require_ssl: false
    example_good: |
      - name: Create Cloud SQL instance
        google.cloud.gcp_sql_instance:
          settings:
            ip_configuration:
              require_ssl: true

  - id: ANS-KICS-GCP-002
    name: GKE Legacy Authorization Enabled
    severity: error
    category: Cloud Security - GCP
    description: "GKE clusters must not have legacy ABAC authorization enabled. Use RBAC instead."
    rationale: "Legacy ABAC in GKE is overly permissive and does not support fine-grained access control. RBAC provides proper least-privilege access and should always be used."
    kics_id: 300a9964-b086-41f7-9378-b6de3ba1c32b
    match_type: regex
    target: any
    pattern: "legacy_abac:\\s*(enabled|true|yes)"
    flags: IGNORECASE
    example_bad: |
      - name: Create GKE cluster
        google.cloud.gcp_container_cluster:
          legacy_abac:
            enabled: true
    example_good: |
      - name: Create GKE cluster
        google.cloud.gcp_container_cluster:
          legacy_abac:
            enabled: false

  - id: ANS-KICS-GCP-003
    name: Compute Instance Is Publicly Accessible
    severity: error
    category: Cloud Security - GCP
    description: "GCP Compute instances should not have external IP addresses unless required. Avoid access_type: ONE_TO_ONE_NAT for internal workloads."
    rationale: "Publicly accessible compute instances increase attack surface. Use private IP addresses and route external traffic through load balancers."
    kics_id: 829f1c60-2bab-44c6-8a21-5cd9d39a2c82
    match_type: regex
    target: any
    pattern: "access_type:\\s*['\"]?ONE_TO_ONE_NAT['\"]?"
    example_bad: |
      - name: Create compute instance
        google.cloud.gcp_compute_instance:
          network_interfaces:
            - access_configs:
                - type: ONE_TO_ONE_NAT
    example_good: |
      - name: Create compute instance
        google.cloud.gcp_compute_instance:
          network_interfaces:
            - name: nic0

  - id: ANS-KICS-GCP-004
    name: SQL DB Instance Backup Disabled
    severity: error
    category: Cloud Security - GCP
    description: "GCP Cloud SQL instances must have automated backups enabled."
    rationale: "Without backups, data loss from corruption or deletion is unrecoverable. Automated backups are essential for any production database."
    kics_id: 0c82eae2-aca0-401f-93e4-fb37a0f9e5e8
    match_type: regex
    target: any
    pattern: "backup_configuration.*\\n(.*\\n){0,3}.*enabled:\\s*(false|no)"
    flags: IGNORECASE
    example_bad: |
      - name: Create Cloud SQL instance
        google.cloud.gcp_sql_instance:
          settings:
            backup_configuration:
              enabled: false
    example_good: |
      - name: Create Cloud SQL instance
        google.cloud.gcp_sql_instance:
          settings:
            backup_configuration:
              enabled: true

  # ─── ANSIBLE CONFIG (ansible.cfg) ─────────────────────────────────────────

  - id: ANS-KICS-CFG-001
    name: Host Key Checking Disabled
    severity: critical
    category: Ansible Configuration Security
    description: "host_key_checking must never be set to False in ansible.cfg or playbooks. SSH host key checking must always be enabled."
    rationale: "Disabling host key checking removes protection against man-in-the-middle attacks. An attacker can intercept the connection by presenting their own SSH key and Ansible will not detect it."
    kics_id: custom-cfg-001
    match_type: regex
    target: any
    pattern: "host_key_checking\\s*=\\s*(false|0|no)"
    flags: IGNORECASE
    example_bad: |
      # ansible.cfg
      [defaults]
      host_key_checking = False
    example_good: |
      # ansible.cfg
      [defaults]
      host_key_checking = True

  - id: ANS-KICS-CFG-002
    name: Allow Unsafe Lookups Enabled
    severity: error
    category: Ansible Configuration Security
    description: "allow_unsafe_lookups must not be enabled in ansible.cfg. Unsafe lookups bypass Jinja2 template security."
    rationale: "Enabling unsafe lookups allows lookup plugin results to be used unsafely in Jinja2 templates, which can lead to template injection vulnerabilities if lookup results contain user-controlled data."
    kics_id: 86b97bb4-85c9-462d-8635-cbc057c5c8c5
    match_type: regex
    target: any
    pattern: "allow_unsafe_lookups\\s*=\\s*(true|1|yes)"
    flags: IGNORECASE
    example_bad: |
      [defaults]
      allow_unsafe_lookups = True
    example_good: |
      [defaults]
      allow_unsafe_lookups = False

  - id: ANS-KICS-CFG-003
    name: Communication Over HTTP in Defaults
    severity: error
    category: Ansible Configuration Security
    description: "Ansible configuration must not use HTTP for communication. Only HTTPS connections are permitted."
    rationale: "HTTP transmits data in plaintext, including credentials and task output. Any network path between Ansible and managed nodes must use encrypted protocols."
    kics_id: d7dc9350-74bc-485b-8c85-fed22d276c43
    match_type: regex
    target: any
    pattern: "http://(?!.*https)"
    flags: IGNORECASE
    example_bad: |
      [defaults]
      galaxy_server_url = http://my-galaxy-server.example.com
    example_good: |
      [defaults]
      galaxy_server_url = https://my-galaxy-server.example.com

  - id: ANS-KICS-CFG-004
    name: StrictHostKeyChecking Disabled in SSH Args
    severity: critical
    category: Ansible Configuration Security
    description: "SSH common args must not include -o StrictHostKeyChecking=no or -o UserKnownHostsFile=/dev/null. These disable SSH security checks."
    rationale: "These SSH options bypass host verification entirely, making the connection trivially vulnerable to man-in-the-middle attacks across all managed hosts."
    kics_id: custom-cfg-004
    match_type: regex
    target: any
    pattern: "StrictHostKeyChecking\\s*=\\s*no|UserKnownHostsFile\\s*=\\s*/dev/null"
    flags: IGNORECASE
    example_bad: |
      [ssh_connection]
      ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
    example_good: |
      [ssh_connection]
      ssh_args = -o ControlMaster=auto -o ControlPersist=60s

  - id: ANS-KICS-CFG-005
    name: No_log Not Set For Sensitive Modules
    severity: error
    category: Ansible Configuration Security
    description: "Tasks using modules that handle credentials (uri with body, mysql_user, postgresql_user, user with password) must set no_log: true."
    rationale: "Ansible logs all task parameters by default. Without no_log, passwords and tokens appear in stdout, log files, and AAP job output where they can be captured."
    kics_id: c6473dae-8477-4119-88b7-b909b435ce7b
    match_type: regex
    target: any
    pattern: "(mysql_user|postgresql_user|htpasswd|ansible\\.builtin\\.user)\\s*:"
    require_sibling: "no_log:\\s*true"
    example_bad: |
      - name: Create database user
        community.mysql.mysql_user:
          name: appuser
          password: "{{ db_password }}"
    example_good: |
      - name: Create database user
        community.mysql.mysql_user:
          name: appuser
          password: "{{ db_password }}"
        no_log: true
