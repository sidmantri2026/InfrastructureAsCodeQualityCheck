category: Bash - Linting & Style
technology: bash
description: >
  Linting and style rules for Linux bash shell scripts.
  Covers shebang, quoting, variable usage, error handling,
  readability and portability best practices.
rules:

  - id: BASH-LINT-001
    name: Script must start with a shebang line
    severity: error
    description: "Every bash script must begin with #!/bin/bash or #!/usr/bin/env bash as the first line."
    rationale: "Without a shebang, the OS does not know which interpreter to use. The script may run under /bin/sh with different behaviour, or fail entirely when executed directly."
    match_type: file_start_missing
    required_patterns:
      - "^#!"
    example_bad: |
      # Deploy script
      echo "Deploying..."
    example_good: |
      #!/usr/bin/env bash
      # Deploy script
      echo "Deploying..."

  - id: BASH-LINT-002
    name: Use #!/usr/bin/env bash instead of hardcoded path
    severity: warning
    description: "Prefer #!/usr/bin/env bash over #!/bin/bash to improve portability across systems."
    rationale: "bash may not be at /bin/bash on all Unix-like systems (e.g. macOS, Alpine Linux). Using /usr/bin/env bash locates bash from PATH, making scripts more portable."
    match_type: regex
    target: any
    pattern: "^#!/bin/bash"
    example_bad: |
      #!/bin/bash
    example_good: |
      #!/usr/bin/env bash

  - id: BASH-LINT-003
    name: Always quote variables
    severity: error
    description: "Variables must be double-quoted when used in commands or comparisons. Unquoted variables are subject to word splitting and glob expansion."
    rationale: "An unquoted variable containing spaces or glob characters causes the shell to split it into multiple words or expand it to matching filenames, leading to bugs that are very hard to diagnose."
    match_type: regex
    target: any
    pattern: "(?<!['\"])\\$[A-Za-z_][A-Za-z0-9_]*(?!['\"]|\\{)"
    exclude_pattern: "#|echo|printf|\\[\\[|\\$\\(|\\$\\{|readonly|local|export|\\$[0-9]"
    example_bad: |
      cp $SOURCE_FILE $DEST_DIR
      if [ $USER = root ]; then
    example_good: |
      cp "$SOURCE_FILE" "$DEST_DIR"
      if [ "$USER" = "root" ]; then

  - id: BASH-LINT-004
    name: Use [[ ]] instead of [ ] for conditionals
    severity: warning
    description: "Use [[ ]] (bash built-in) instead of [ ] (POSIX test) for conditional expressions in bash scripts."
    rationale: "[[ ]] does not perform word splitting or glob expansion on variables, handles empty strings safely, supports && and || natively, and provides regex matching with =~. It is safer and more readable."
    match_type: regex
    target: any
    pattern: "^\\s*if\\s+\\[(?!\\[)|^\\s*elif\\s+\\[(?!\\[)|\\s+\\[\\s+[^[]"
    exclude_pattern: "#"
    example_bad: |
      if [ "$VAR" = "value" ]; then
      if [ -f $FILE ]; then
    example_good: |
      if [[ "$VAR" = "value" ]]; then
      if [[ -f "$FILE" ]]; then

  - id: BASH-LINT-005
    name: Enable strict mode at script top
    severity: error
    description: "Scripts must include 'set -euo pipefail' (or equivalent) near the top to enable strict error handling."
    rationale: "Without strict mode: 'set -e' — script continues on command failure silently; 'set -u' — unset variables expand to empty string causing subtle bugs; 'set -o pipefail' — pipeline failures are masked by the last command's exit code."
    match_type: file_missing_pattern
    required_pattern: "set -[a-zA-Z]*e[a-zA-Z]*|set -o errexit"
    search_lines: 20
    example_bad: |
      #!/usr/bin/env bash
      # No error handling
      rm -rf "$TARGET_DIR"
    example_good: |
      #!/usr/bin/env bash
      set -euo pipefail
      rm -rf "$TARGET_DIR"

  - id: BASH-LINT-006
    name: Use $(  ) instead of backticks for command substitution
    severity: warning
    description: "Use $( command ) for command substitution instead of backtick syntax."
    rationale: "The $() syntax nests cleanly, is more readable, and works identically. Backticks cannot be nested without escaping and are harder to read, especially inside complex expressions."
    match_type: regex
    target: any
    pattern: "`[^`]+`"
    exclude_pattern: "#|'"
    example_bad: |
      DATE=`date +%Y-%m-%d`
      FILES=`ls -la "$DIR"`
    example_good: |
      DATE=$(date +%Y-%m-%d)
      FILES=$(ls -la "$DIR")

  - id: BASH-LINT-007
    name: Declare variables with local inside functions
    severity: warning
    description: "Variables declared inside functions must use the 'local' keyword to prevent polluting the global scope."
    rationale: "Without 'local', variables set inside functions become global and can accidentally overwrite variables in the calling scope, causing hard-to-trace bugs in larger scripts."
    match_type: regex
    target: any
    pattern: "^\\s*[A-Z_][A-Z0-9_]*=(?!.*local)"
    exclude_pattern: "^\\s*#|^\\s*export|^\\s*readonly|^\\s*declare"
    example_bad: |
      deploy() {
        VERSION="1.2.3"
        echo "Deploying $VERSION"
      }
    example_good: |
      deploy() {
        local VERSION="1.2.3"
        echo "Deploying $VERSION"
      }

  - id: BASH-LINT-008
    name: Scripts must not exceed 200 lines
    severity: warning
    description: "Shell scripts longer than 200 lines should be split into smaller, focused scripts or functions."
    rationale: "Long scripts are difficult to read, test, and maintain. Functions should be extracted to separate files and sourced, or tasks decomposed into smaller scripts with clear responsibilities."
    match_type: file_length
    max_lines: 200
    example_good: |
      # Split large scripts using sourcing:
      source ./lib/deploy_functions.sh
      source ./lib/validation.sh

  - id: BASH-LINT-009
    name: Use printf instead of echo for formatted output
    severity: info
    description: "Prefer printf over echo for output that includes escape sequences or formatted text."
    rationale: "echo behaviour differs between shells and systems (e.g. echo -e is not portable). printf is consistent across all POSIX-compliant systems and has predictable behaviour with escape sequences."
    match_type: regex
    target: any
    pattern: "echo\\s+-[eEn]"
    example_bad: |
      echo -e "Error: \t$MESSAGE"
    example_good: |
      printf "Error: \t%s\n" "$MESSAGE"

  - id: BASH-LINT-010
    name: Constants should be uppercase and readonly
    severity: info
    description: "Variables that are intended to be constants should be uppercase and declared with readonly."
    rationale: "Using readonly prevents accidental reassignment. Uppercase naming signals to readers that a value is a constant, making intent clear and preventing subtle modification bugs."
    match_type: regex
    target: any
    pattern: "^readonly\\s+[a-z]|^declare\\s+-r\\s+[a-z]"
    exclude_pattern: "#"
    example_bad: |
      readonly max_retries=3
      readonly deploy_timeout=30
    example_good: |
      readonly MAX_RETRIES=3
      readonly DEPLOY_TIMEOUT=30

  - id: BASH-LINT-011
    name: Always handle cd failure
    severity: error
    description: "Every 'cd' command must either use '|| exit' error handling or be used with strict mode to prevent running commands in the wrong directory."
    rationale: "If cd fails silently, subsequent commands run in the wrong directory. This can result in files being deleted, created, or modified in unintended locations — potentially catastrophic in deployment scripts."
    match_type: regex
    target: any
    pattern: "^\\s*cd\\s+[^;|&].*$(?!.*\\|\\||.*&&)"
    exclude_pattern: "#|cd -$|cd \\$\\(|\\|\\||&&"
    example_bad: |
      cd "$DEPLOY_DIR"
      rm -rf ./tmp
    example_good: |
      cd "$DEPLOY_DIR" || exit 1
      rm -rf ./tmp

  - id: BASH-LINT-012
    name: Functions must have descriptive names in snake_case
    severity: warning
    description: "Function names must use snake_case and be descriptive of their purpose. Avoid single-letter or cryptic names."
    rationale: "Descriptive function names make scripts self-documenting. A reader should understand what a function does without reading its body."
    match_type: regex
    target: any
    pattern: "^(function\\s+)?[A-Z][a-zA-Z]*\\s*\\(\\)|^(function\\s+)?[a-z][a-zA-Z]*[A-Z][a-zA-Z]*\\s*\\(\\)"
    exclude_pattern: "#"
    example_bad: |
      function deployApp() { ... }
      function D() { ... }
    example_good: |
      function deploy_application() { ... }
      function validate_config() { ... }
