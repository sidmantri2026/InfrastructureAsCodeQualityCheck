category: PowerShell - Idempotency
technology: powershell
description: >
  Idempotency rules for Windows PowerShell scripts (.ps1).
  An idempotent script produces the same result whether run once or many times.
  These rules enforce Test-before-Set patterns, existence guards, and
  state-checking before making changes to the system.
rules:

  - id: PS-IDEM-001
    name: Test before creating directories
    severity: error
    description: "Before creating a directory with New-Item -ItemType Directory, check whether it already exists using Test-Path."
    rationale: "New-Item fails with an error if the directory already exists (unless -Force is used). Without a guard, re-runs break. Use Test-Path first or New-Item with -Force to make the operation idempotent."
    match_type: regex
    target: any
    pattern: "New-Item\\s+.*-ItemType\\s+(Directory|Dir)"
    exclude_pattern: "#|Test-Path|if\\s+|\\(Test-Path|\\$\\(Test-Path|-Force"
    example_bad: |
      New-Item -Path 'C:\App\Logs' -ItemType Directory
      New-Item -Path $DeployPath -ItemType Directory
    example_good: |
      if (-not (Test-Path -Path 'C:\App\Logs')) {
          New-Item -Path 'C:\App\Logs' -ItemType Directory | Out-Null
      }
      # Or using -Force which is idempotent:
      New-Item -Path 'C:\App\Logs' -ItemType Directory -Force | Out-Null

  - id: PS-IDEM-002
    name: Test before writing files
    severity: warning
    description: "Before writing content to a file with Set-Content or Out-File, check whether the file already contains the expected content."
    rationale: "Unconditionally writing files on every run changes the file's modification timestamp, triggers change detection in monitoring tools, and restarts services watching those files unnecessarily."
    match_type: regex
    target: any
    pattern: "(Set-Content|Out-File)\\s+(?!.*-Append)"
    exclude_pattern: "#|Get-Content|Test-Path|if\\s+|Compare-Object"
    example_bad: |
      Set-Content -Path 'C:\App\config.ini' -Value $ConfigContent
      $Report | Out-File -FilePath 'C:\Logs\status.txt'
    example_good: |
      $CurrentContent = Get-Content -Path 'C:\App\config.ini' -Raw -ErrorAction SilentlyContinue
      if ($CurrentContent -ne $ConfigContent) {
          Set-Content -Path 'C:\App\config.ini' -Value $ConfigContent
      }

  - id: PS-IDEM-003
    name: Test before adding registry entries
    severity: error
    description: "Before creating registry keys or values, check their existence with Test-Path or Get-ItemProperty. Never write registry entries unconditionally."
    rationale: "Writing registry entries without checking their current value overwrites existing configurations on every run. This can overwrite values that were deliberately changed by administrators post-deployment."
    match_type: regex
    target: any
    pattern: "(New-ItemProperty|Set-ItemProperty)\\s+.*-Path\\s+['\"]?HKLM|New-Item\\s+.*-Path\\s+['\"]?HKCU|New-Item\\s+.*-Path\\s+['\"]?HKLM"
    exclude_pattern: "#|Test-Path|Get-ItemProperty|if\\s+|\\(Test-Path"
    example_bad: |
      New-ItemProperty -Path 'HKLM:\SOFTWARE\MyApp' -Name 'Version' -Value '1.0'
      Set-ItemProperty -Path 'HKLM:\SYSTEM\Setup' -Name 'LogLevel' -Value 3
    example_good: |
      if (-not (Test-Path -Path 'HKLM:\SOFTWARE\MyApp')) {
          New-Item -Path 'HKLM:\SOFTWARE\MyApp' -Force | Out-Null
      }
      $CurrentValue = Get-ItemProperty -Path 'HKLM:\SOFTWARE\MyApp' -Name 'Version' -ErrorAction SilentlyContinue
      if ($CurrentValue.Version -ne '1.0') {
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\MyApp' -Name 'Version' -Value '1.0'
      }

  - id: PS-IDEM-004
    name: Check service state before starting or stopping
    severity: error
    description: "Before starting or stopping a Windows service, check its current status with Get-Service. Avoid unconditional Start-Service or Stop-Service calls."
    rationale: "Calling Start-Service on an already-running service or Stop-Service on a stopped service generates warnings and may cause errors that abort the script. Always check current status first."
    match_type: regex
    target: any
    pattern: "^\\s*(Start-Service|Stop-Service|Restart-Service)\\s+"
    exclude_pattern: "#|Get-Service|if\\s+|\\$.*Status|ServiceController"
    example_bad: |
      Start-Service -Name 'W32Time'
      Stop-Service  -Name 'Spooler'
    example_good: |
      $svc = Get-Service -Name 'W32Time' -ErrorAction SilentlyContinue
      if ($svc -and $svc.Status -ne 'Running') {
          Start-Service -Name 'W32Time'
      }

  - id: PS-IDEM-005
    name: Check before installing Windows features or roles
    severity: error
    description: "Before calling Install-WindowsFeature or Enable-WindowsOptionalFeature, check whether the feature is already installed."
    rationale: "Installing a feature that is already installed is slow and may require a restart even when nothing changed. Always check the installation state first to make the script safe to re-run without side effects."
    match_type: regex
    target: any
    pattern: "(Install-WindowsFeature|Enable-WindowsOptionalFeature|Add-WindowsCapability)\\s+"
    exclude_pattern: "#|Get-WindowsFeature|Get-WindowsOptionalFeature|if\\s+"
    example_bad: |
      Install-WindowsFeature -Name 'Web-Server' -IncludeManagementTools
      Enable-WindowsOptionalFeature -Online -FeatureName 'IIS-WebServerRole'
    example_good: |
      $feature = Get-WindowsFeature -Name 'Web-Server'
      if ($feature.InstallState -ne 'Installed') {
          Install-WindowsFeature -Name 'Web-Server' -IncludeManagementTools
      }

  - id: PS-IDEM-006
    name: Check before creating scheduled tasks
    severity: error
    description: "Before registering a scheduled task with Register-ScheduledTask, check if it already exists using Get-ScheduledTask."
    rationale: "Register-ScheduledTask fails if the task already exists. Without a guard, re-runs abort at this point. Check first and use -Force or unregister/re-register only when the definition has changed."
    match_type: regex
    target: any
    pattern: "Register-ScheduledTask\\s+"
    exclude_pattern: "#|Get-ScheduledTask|if\\s+|\\$.*ScheduledTask|-Force"
    example_bad: |
      Register-ScheduledTask -TaskName 'DailyBackup' -Action $action -Trigger $trigger
    example_good: |
      $existing = Get-ScheduledTask -TaskName 'DailyBackup' -ErrorAction SilentlyContinue
      if (-not $existing) {
          Register-ScheduledTask -TaskName 'DailyBackup' -Action $action -Trigger $trigger
      }

  - id: PS-IDEM-007
    name: Check before adding hosts file entries
    severity: warning
    description: "Before appending entries to the hosts file or other system config files, check whether the entry already exists."
    rationale: "Appending without checking creates duplicate entries on every re-run. Duplicate hosts file entries can cause DNS resolution issues and are a sign of non-idempotent automation."
    match_type: regex
    target: any
    pattern: "Add-Content\\s+.*hosts|Out-File\\s+.*hosts|Set-Content\\s+.*hosts"
    exclude_pattern: "#|Select-String|Get-Content|if\\s+"
    example_bad: |
      Add-Content -Path 'C:\Windows\System32\drivers\etc\hosts' -Value "192.168.1.10`tmyserver"
    example_good: |
      $hostsPath = 'C:\Windows\System32\drivers\etc\hosts'
      $entry = "192.168.1.10`tmyserver"
      if (-not (Select-String -Path $hostsPath -Pattern [regex]::Escape($entry) -Quiet)) {
          Add-Content -Path $hostsPath -Value $entry
      }

  - id: PS-IDEM-008
    name: Check before creating local users or groups
    severity: error
    description: "Before creating local users with New-LocalUser or groups with New-LocalGroup, check if they already exist."
    rationale: "New-LocalUser and New-LocalGroup throw terminating errors if the account already exists. Without guards, re-running fails immediately and skips all subsequent steps."
    match_type: regex
    target: any
    pattern: "(New-LocalUser|New-LocalGroup|New-ADUser|New-ADGroup)\\s+"
    exclude_pattern: "#|Get-LocalUser|Get-LocalGroup|Get-ADUser|Get-ADGroup|if\\s+"
    example_bad: |
      New-LocalUser -Name 'AppService' -NoPassword
      New-LocalGroup -Name 'AppAdmins'
    example_good: |
      if (-not (Get-LocalUser -Name 'AppService' -ErrorAction SilentlyContinue)) {
          New-LocalUser -Name 'AppService' -NoPassword
      }
      if (-not (Get-LocalGroup -Name 'AppAdmins' -ErrorAction SilentlyContinue)) {
          New-LocalGroup -Name 'AppAdmins'
      }

  - id: PS-IDEM-009
    name: Check before installing software packages
    severity: error
    description: "Before installing software with Install-Package, winget, or choco, check whether the package is already installed."
    rationale: "Installing a package that is already installed wastes time, requires network access, and can trigger unnecessary reboots. Always check the installed state before attempting installation."
    match_type: regex
    target: any
    pattern: "(Install-Package|winget\\s+install|choco\\s+install)\\s+"
    exclude_pattern: "#|Get-Package|Get-InstalledApplication|if\\s+|Test-Path"
    example_bad: |
      Install-Package -Name 'Git' -Source 'winget'
      choco install googlechrome -y
    example_good: |
      if (-not (Get-Package -Name 'Git' -ErrorAction SilentlyContinue)) {
          Install-Package -Name 'Git' -Source 'winget'
      }

  - id: PS-IDEM-010
    name: Use -WhatIf support to make destructive operations safely testable
    severity: warning
    description: "Functions performing destructive or state-changing operations must support SupportsShouldProcess so callers can use -WhatIf to simulate without applying changes."
    rationale: "SupportsShouldProcess with -WhatIf allows operators to preview exactly what the script will do before running it for real. This is essential for idempotency testing: operators can verify expected state changes on first run without side effects."
    match_type: regex
    target: any
    pattern: "(Remove-Item|Remove-ADUser|Remove-ADGroup|Uninstall-WindowsFeature|Clear-RecycleBin|Format-Volume)\\s+"
    require_nearby: "SupportsShouldProcess|WhatIf"
    exclude_pattern: "#"
    example_bad: |
      function Clear-OldDeployments {
          [CmdletBinding()]
          param([string]$Path)
          Remove-Item -Path $Path -Recurse -Force
      }
    example_good: |
      function Clear-OldDeployments {
          [CmdletBinding(SupportsShouldProcess=$true)]
          param([string]$Path)
          if ($PSCmdlet.ShouldProcess($Path, 'Remove deployment directory')) {
              Remove-Item -Path $Path -Recurse -Force
          }
      }
